<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kintone フィールド一括投入ツール</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #f7f8fc; color: #1a1f2e; font-size: 14px; line-height: 1.6; padding: 32px 24px; }
  .shell { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #1e3a5f; }
  .sub { font-size: 13px; color: #6b7489; margin-bottom: 28px; }
  .card { background: #fff; border: 1px solid #e2e6f0; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 700; color: #1e3a5f; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #e2e6f0; }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  label { font-size: 12px; font-weight: 600; color: #3d4558; }
  input, select { padding: 9px 12px; border: 1.5px solid #e2e6f0; border-radius: 7px; font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s; }
  input:focus, select:focus { border-color: #2a5bd7; box-shadow: 0 0 0 3px rgba(42,91,215,.1); }
  .note { font-size: 11px; color: #6b7489; margin-top: 2px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; font-family: inherit; }
  .btn-primary { background: #2a5bd7; color: #fff; width: 100%; justify-content: center; font-size: 14px; padding: 12px; }
  .btn-primary:hover { background: #1a3fa0; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .log { background: #f2f4fb; border: 1px solid #d0d9f0; border-radius: 8px; padding: 14px; font-family: 'DM Mono', monospace; font-size: 12px; line-height: 1.8; max-height: 360px; overflow-y: auto; white-space: pre-wrap; margin-top: 16px; display: none; }
  .log.show { display: block; }
  .ok   { color: #166534; }
  .err  { color: #c00000; }
  .info { color: #1a3fa0; }
  .warn { color: #b45309; }
  .progress { height: 6px; background: #e2e6f0; border-radius: 99px; margin-top: 12px; overflow: hidden; display: none; }
  .progress-bar { height: 100%; background: #2a5bd7; border-radius: 99px; transition: width .3s; width: 0%; }
  .progress.show { display: block; }
  .field-list { display: grid; gap: 6px; margin-top: 8px; }
  .field-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #f7f8fc; border: 1px solid #e2e6f0; border-radius: 6px; font-size: 12px; }
  .field-item .badge { background: #e8effc; color: #2a5bd7; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .field-item .code { font-family: monospace; color: #6b7489; margin-left: auto; }
</style>
</head>
<body>
<div class="shell">
  <h1>🔧 kintone フィールド一括投入ツール</h1>
  <p class="sub">APIトークンとアプリIDを入力して実行すると、顧客マスタのフィールドが自動で作成されます。</p>

  <div class="card">
    <div class="card-title">⚙️ 接続設定</div>
    <div class="form-group">
      <label>kintone サブドメイン</label>
      <input type="text" id="subdomain" placeholder="例：homesteel" value="homesteel">
      <div class="note">URLの「〇〇.cybozu.com」の〇〇部分</div>
    </div>
    <div class="form-group">
      <label>アプリID</label>
      <input type="number" id="app-id" placeholder="例：229" value="229">
    </div>
    <div class="form-group">
      <label>APIトークン（アプリ管理権限付き）</label>
      <input type="password" id="api-token" placeholder="発行したAPIトークンを入力">
      <div class="note">アプリ設定 → APIトークン → アプリの管理にチェックして発行</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📋 投入するフィールド一覧（顧客マスタ）</div>
    <div class="field-list" id="field-list"></div>
  </div>

  <button class="btn btn-primary" id="run-btn" onclick="runImport()">▶ フィールドを一括投入する</button>

  <div class="progress" id="progress"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="log" id="log"></div>
</div>

<script>
// ── フィールド定義 ──────────────────────────────────
const FIELDS = [
  {
    type: 'SINGLE_LINE_TEXT',
    code: 'customer_name',
    label: '顧客名',
    required: true,
    noLabel: false,
  },
  {
    type: 'SINGLE_LINE_TEXT',
    code: 'customer_kana',
    label: 'フリガナ',
    required: false,
  },
  {
    type: 'DROP_DOWN',
    code: 'customer_type',
    label: '顧客種別',
    required: true,
    options: {
      '社会福祉法人': { label: '社会福祉法人', index: '0' },
      '学校法人':     { label: '学校法人',     index: '1' },
      '株式会社':     { label: '株式会社',     index: '2' },
      '有限会社':     { label: '有限会社',     index: '3' },
      '一般社団法人': { label: '一般社団法人', index: '4' },
      '一般財団法人': { label: '一般財団法人', index: '5' },
      'NPO法人':      { label: 'NPO法人',      index: '6' },
      '個人':         { label: '個人',         index: '7' },
      '個人（被相続人）': { label: '個人（被相続人）', index: '8' },
      'その他':       { label: 'その他',       index: '9' },
    },
    defaultValue: '',
  },
  {
    type: 'SINGLE_LINE_TEXT',
    code: 'corp_number',
    label: '法人番号',
    required: false,
  },
  {
    type: 'SINGLE_LINE_TEXT',
    code: 'zip',
    label: '郵便番号',
    required: false,
  },
  {
    type: 'SINGLE_LINE_TEXT',
    code: 'pref',
    label: '都道府県',
    required: false,
  },
  {
    type: 'SINGLE_LINE_TEXT',
    code: 'city',
    label: '市区町村',
    required: false,
  },
  {
    type: 'SINGLE_LINE_TEXT',
    code: 'street',
    label: '番地以下',
    required: false,
  },
  {
    type: 'SINGLE_LINE_TEXT',
    code: 'tel',
    label: '電話番号',
    required: false,
  },
  {
    type: 'SINGLE_LINE_TEXT',
    code: 'email',
    label: 'メールアドレス',
    required: false,
  },
  {
    type: 'SINGLE_LINE_TEXT',
    code: 'referrer',
    label: '紹介元',
    required: false,
  },
  {
    type: 'SINGLE_LINE_TEXT',
    code: 'referrer_staff',
    label: '紹介元担当者',
    required: false,
  },
  {
    type: 'SINGLE_LINE_TEXT',
    code: 'chatwork_room_id',
    label: 'chatworkRoomId',
    required: false,
  },
  {
    type: 'DROP_DOWN',
    code: 'status',
    label: 'ステータス',
    required: true,
    options: {
      '有効': { label: '有効', index: '0' },
      '休止': { label: '休止', index: '1' },
      '解約': { label: '解約', index: '2' },
    },
    defaultValue: '有効',
  },
  {
    type: 'MULTI_LINE_TEXT',
    code: 'notes',
    label: '備考',
    required: false,
  },
];

const TYPE_LABEL = {
  SINGLE_LINE_TEXT: '文字列（1行）',
  MULTI_LINE_TEXT:  '文字列（複数行）',
  DROP_DOWN:        'ドロップダウン',
  RADIO_BUTTON:     'ラジオボタン',
  CHECK_BOX:        'チェックボックス',
  DATE:             '日付',
  NUMBER:           '数値',
  CALC:             '計算',
  FILE:             '添付ファイル',
  USER_SELECT:      'ユーザー選択',
};

// フィールド一覧を画面に表示
document.getElementById('field-list').innerHTML = FIELDS.map(f => `
  <div class="field-item">
    <span>${f.label}</span>
    <span class="badge">${TYPE_LABEL[f.type] || f.type}</span>
    ${f.required ? '<span style="color:#c00000;font-size:11px;font-weight:700">必須</span>' : ''}
    <span class="code">${f.code}</span>
  </div>
`).join('');

// ── ログ出力 ──
function log(msg, type='info') {
  const el = document.getElementById('log');
  el.classList.add('show');
  el.innerHTML += `<span class="${type}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

function setProgress(pct) {
  const bar = document.getElementById('progress-bar');
  const prog = document.getElementById('progress');
  prog.classList.add('show');
  bar.style.width = pct + '%';
}

// ── メイン処理 ──
async function runImport() {
  const subdomain = document.getElementById('subdomain').value.trim();
  const appId     = document.getElementById('app-id').value.trim();
  const token     = document.getElementById('api-token').value.trim();

  if(!subdomain || !appId || !token) {
    alert('サブドメイン・アプリID・APIトークンを全て入力してください');
    return;
  }

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = '処理中...';
  document.getElementById('log').innerHTML = '';

  const base = `https://${subdomain}.cybozu.com`;

  log('▶ フィールド投入を開始します', 'info');
  log(`  対象アプリ: ${base}/k/${appId}/`, 'info');
  log(`  投入フィールド数: ${FIELDS.length}`, 'info');
  log('');

  // フィールド定義を構築
  const properties = {};
  FIELDS.forEach(f => {
    const def = { type: f.type, code: f.code, label: f.label };
    if(f.required !== undefined) def.required = f.required;
    if(f.options)       def.options = f.options;
    if(f.defaultValue !== undefined) def.defaultValue = f.defaultValue;
    properties[f.code] = def;
  });

  setProgress(20);
  log('📤 kintone APIにリクエスト送信中...', 'info');

  try {
    const res = await fetch(`${base}/k/v1/preview/app/form/fields.json`, {
      method: 'POST',
      headers: {
        'X-Cybozu-API-Token': token,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ app: appId, properties }),
    });

    setProgress(60);
    const data = await res.json();

    if(!res.ok) {
      log(`❌ エラー: ${JSON.stringify(data, null, 2)}`, 'err');
      log('', '');
      log('よくあるエラーの原因:', 'warn');
      log('  ・APIトークンに「アプリの管理」権限がない', 'warn');
      log('  ・アプリIDが間違っている', 'warn');
      log('  ・すでに同じフィールドコードが存在する', 'warn');
      btn.disabled = false;
      btn.textContent = '▶ フィールドを一括投入する';
      return;
    }

    log('✅ フィールドの追加に成功しました', 'ok');
    log('');
    setProgress(80);

    // アプリを公開（プレビューから本番に反映）
    log('📤 アプリを更新中（プレビュー→本番反映）...', 'info');
    const deployRes = await fetch(`${base}/k/v1/preview/app/deploy.json`, {
      method: 'POST',
      headers: {
        'X-Cybozu-API-Token': token,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ apps: [{ app: appId }] }),
    });

    const deployData = await deployRes.json();

    if(!deployRes.ok) {
      log(`⚠️ アプリ更新に失敗: ${JSON.stringify(deployData)}`, 'warn');
      log('kintoneの「アプリを更新」ボタンを手動で押してください', 'warn');
    } else {
      log('✅ アプリの更新が完了しました', 'ok');
    }

    setProgress(100);
    log('');
    log('─────────────────────────────', 'info');
    log('🎉 完了！kintoneアプリを確認してください', 'ok');
    log(`  ${base}/k/${appId}/`, 'info');
    log('');
    log('次のステップ:', 'info');
    log('  1. kintoneで投入されたフィールドを確認', 'info');
    log('  2. フォームのレイアウトを調整', 'info');
    log('  3. アクセス権を設定', 'info');

  } catch(e) {
    log(`❌ 通信エラー: ${e.message}`, 'err');
    log('', '');
    log('CORSエラーの場合は、kintoneの同じブラウザで開いてください', 'warn');
  }

  btn.disabled = false;
  btn.textContent = '▶ フィールドを一括投入する';
}
</script>
</body>
</html>
